<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lucky Zone - Legal Center</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050816;
    color:white;
    overflow-x:hidden;
}

/* ===== NEON BACKGROUND ORBS ===== */
.orb{
    position:fixed;
    width:300px;
    height:300px;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.6;
    animation:float 8s infinite alternate ease-in-out;
    z-index:-1;
}

.orb1{background:#3b82f6; top:-50px; left:-50px;}
.orb2{background:#8b5cf6; bottom:-80px; right:-80px; animation-delay:2s;}
.orb3{background:#22d3ee; top:40%; left:60%; animation-delay:4s;}

@keyframes float{
    from{transform:translateY(0px) scale(1);}
    to{transform:translateY(80px) scale(1.2);}
}

/* ===== HEADER ===== */
.header{
    text-align:center;
    padding:60px 20px;
    background:linear-gradient(90deg,#0f172a,#1e3a8a,#0ea5e9);
    box-shadow:0 0 40px rgba(59,130,246,0.4);
    position:relative;
    overflow:hidden;
}

.header h1{
    font-size:32px;
    margin:0;
    text-shadow:0 0 20px #38bdf8;
    animation:pulse 3s infinite;
}

@keyframes pulse{
    0%{text-shadow:0 0 10px #38bdf8;}
    50%{text-shadow:0 0 30px #38bdf8;}
    100%{text-shadow:0 0 10px #38bdf8;}
}

/* ===== STAR EFFECT ===== */
.star{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    opacity:0.7;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:0.2; transform:scale(1);}
    50%{opacity:1; transform:scale(1.8);}
}

/* ===== CONTAINER ===== */
.container{
    max-width:650px;
    margin:auto;
    padding:30px;
}

/* ===== GLASS CARD ===== */
.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.1);
    padding:25px;
    border-radius:18px;
    margin:25px 0;
    box-shadow:0 0 30px rgba(59,130,246,0.15);

    opacity:0;
    transform:translateY(40px);
    transition:0.7s ease;
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

/* ===== LINKS ===== */
a{
    display:block;
    margin:12px 0;
    padding:14px;
    text-decoration:none;
    color:white;
    background:linear-gradient(90deg,#3b82f6,#8b5cf6);
    border-radius:12px;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

/* hover glow */
a:hover{
    transform:translateY(-3px);
    box-shadow:0 0 20px rgba(59,130,246,0.6);
}

/* hover sparkle */
a::after{
    content:"";
    position:absolute;
    width:10px;
    height:10px;
    background:white;
    top:50%;
    left:50%;
    opacity:0;
    border-radius:50%;
    transform:translate(-50%,-50%) scale(1);
}

a:hover::after{
    animation:spark 0.6s ease-out;
}

@keyframes spark{
    0%{opacity:1; transform:translate(-50%,-50%) scale(0);}
    100%{opacity:0; transform:translate(-50%,-50%) scale(6);}
}

/* ===== BUTTON ===== */
.toggle{
    padding:10px 16px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#0ea5e9,#8b5cf6);
    color:white;
    cursor:pointer;
    box-shadow:0 0 15px rgba(139,92,246,0.4);
}

</style>
</head>

<body>

<!-- glowing background -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="header">
    <h1>Lucky Zone Legal Center</h1>
    <p style="opacity:0.8;">Secure Policies & Terms</p>

    <!-- random stars -->
    <div class="star" style="top:20px;left:30px;"></div>
    <div class="star" style="top:60px;left:80px;"></div>
    <div class="star" style="top:40px;right:60px;"></div>
</div>

<div class="container">

<div class="card">
    <h2>Legal Documents</h2>
    <p style="opacity:0.7;">Official policies for Lucky Zone app</p>

    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
</div>

</div>

<script>
const cards=document.querySelectorAll(".card");

function show(){
cards.forEach(c=>{
if(c.getBoundingClientRect().top<window.innerHeight-80){
c.classList.add("show");
}
});
}

window.addEventListener("scroll",show);
show();
</script>

</body>
</html>
